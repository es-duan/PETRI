name: PETRI
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
# Add Conda's isolated compilers
  - c-compiler
  - cxx-compiler
  - fortran-compiler
  
  # R runtime and packages used in src/*.R
  - r-base>=4.4.0
  - r-tidyverse=2.0.0
  - r-argparse
  - r-jsonlite
  - r-desolve
  - r-foreach
  - r-doparallel
  - r-broom
  - r-patchwork
  - r-colorspace
  - r-ggnewscale

  # Required by src/fig_axes.R, but not currently available as a conda package.
  # Install after creating the env:
  # R -q -e 'install.packages("funkyheatmap", repos="https://cloud.r-project.org")'